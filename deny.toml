# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "all"
yanked = "deny"
notice = "warn"
ignore = [
    "RUSTSEC-2025-0141", # Bincode unmaintained - acknowledged for initial setup
    "RUSTSEC-2024-0436", # Paste unmaintained (transitive dependency of tract)
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
]
copyleft = "deny"
allow-osi-fsf-free = "both"

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
